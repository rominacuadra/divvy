[alembic]
# Ruta al script de entorno
script_location = alembic

# Formato del nombre de archivo de migraciones
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Timezone para los timestamps
timezone = UTC

# La URL se sobreescribe en env.py desde la variable de entorno DATABASE_URL
sqlalchemy.url = mysql+pymysql://root:root@localhost:3306/misgastos

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
